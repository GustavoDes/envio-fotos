<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Envio de Fotos — GEARPE</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <!-- LOGIN -->
    <div id="loginScreen" class="center-screen">
        <div class="login-wrap">

            <div class="login-logo">
                <img src="./Logo GEARPE Vetorizada.svg" alt="Logo GEARPE" class="logo-svg">
            </div>

            <div class="login-card">
                <h1 class="login-title">GEARPE</h1>
                <p class="login-subtitle">Grupo Escoteiro do Ar Padre Eustáquio</p>
                <div class="login-divider"></div>
                <p class="login-desc">Envio de Fotos</p>

                <div class="input-wrap">
                    <input type="password" id="senhaLogin" placeholder="Senha de acesso" autocomplete="current-password">
                </div>

                <button id="btnEntrar">Entrar</button>

                <div id="loginErro"></div>

                <p class="help-text">Esqueceu a senha? Entre em contato com a chefia.</p>
            </div>
        </div>
    </div>

    <!-- UPLOAD -->
    <div id="uploadScreen">

        <header class="site-header">
            <div class="header-inner">
                <div class="header-logo">
                    <img src="./Logo GEARPE Vetorizada.svg" alt="Logo GEARPE" class="logo-svg-sm">
                    <span class="header-name">GEARPE</span>
                </div>
                <p class="header-sub">Acervo de Fotos</p>
            </div>
        </header>

        <div class="container">

            <form id="uploadForm">
                <input type="hidden" name="senha" id="senhaOculta">

                <div class="section-label">Atividade</div>
                <div class="card">
                    <div class="field-row">
                        <div class="field">
                            <label>Ramo</label>
                            <select id="ramo" name="ramo" required>
                                <option value="">Selecione</option>
                                <option>Ramo Lobinho</option>
                                <option>Ramo Escoteiro</option>
                                <option>Tropa Sênior Uiraçu</option>
                                <option>Clã Pioneiro Ytacolomy</option>
                                <option>Chefia</option>
                                <option>Geral-Misto</option>
                            </select>
                        </div>
                        <div class="field" id="subunidadeContainer">
                            <label>Seção</label>
                            <select id="subunidade" name="subunidade"></select>
                        </div>
                    </div>

                    <div class="field">
                        <label>Tipo</label>
                        <div class="radio-group">
                            <label class="radio-card">
                                <input type="radio" name="tipo" value="Sede" required>
                                <span>Sede</span>
                            </label>
                            <label class="radio-card">
                                <input type="radio" name="tipo" value="Externa">
                                <span>Externa</span>
                            </label>
                        </div>
                    </div>
                </div>

                <div class="section-label">Dados</div>
                <div class="card">
                    <div class="field-row">
                        <div class="field">
                            <label>Data</label>
                            <input type="date" name="data" required>
                        </div>
                        <div class="field">
                            <label>Nome da atividade</label>
                            <input type="text" name="atividade" placeholder="Ex.: Acampamento de Grupo" required>
                        </div>
                    </div>
                </div>

                <div class="section-label">Fotos</div>
                <div class="card upload-card">
                    <label class="upload-zone" for="fotos">
                        <div class="upload-icon">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                                <polyline points="17 8 12 3 7 8"/>
                                <line x1="12" y1="3" x2="12" y2="15"/>
                            </svg>
                        </div>
                        <p class="upload-cta">Clique para selecionar fotos</p>
                        <p class="upload-hint">ou arraste aqui</p>
                        <input type="file" name="fotos" id="fotos" multiple accept="image/*" required>
                    </label>
                    <div id="contadorFotos"></div>
                </div>

                <button type="submit" id="btnEnviar">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"/>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                    Enviar Fotos
                </button>

            </form>

            <div id="resultado"></div>

        </div>
    </div>

    <!-- OVERLAYS -->
    <div id="uploadOverlay">
        <div class="modal">
            <div class="spinner"></div>
            <h2 id="tituloUpload">Enviando fotos…</h2>
            <div class="progressBar"><div id="progressFill"></div></div>
            <p id="progressLabel">0%</p>
        </div>
    </div>

    <div id="successOverlay">
        <div class="modal">
            <div class="successIcon">
                <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <polyline points="20 6 9 17 4 12"/>
                </svg>
            </div>
            <h2>Enviado com sucesso!</h2>
            <p>Todas as fotos foram salvas no acervo do grupo.</p>
            <button id="btnFecharSucesso">OK</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
